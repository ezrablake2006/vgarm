name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MUJOCO_GL: osmesa
      PYOPENGL_PLATFORM: osmesa
      PYTHONPATH: ${{ github.workspace }}/source
      VGARM_MENAGERIE_ROOT: ${{ github.workspace }}/third_party/mujoco_menagerie

    steps:
      - name: Checkout VGArm
        uses: actions/checkout@v6

      - name: Checkout MuJoCo Menagerie
        uses: actions/checkout@v6
        with:
          repository: google-deepmind/mujoco_menagerie
          ref: main
          path: third_party/mujoco_menagerie

      - name: Show Menagerie revision
        run: |
          echo "MuJoCo Menagerie commit:"
          git -C third_party/mujoco_menagerie rev-parse HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install headless rendering libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libosmesa6-dev \
            libgl1-mesa-dri

      - name: Install VGArm and RGB dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[rgb]"

      - name: Checkout MuJoCo Menagerie
        uses: actions/checkout@v4
        with:
          repository: google-deepmind/mujoco_menagerie
          ref: f809e257c7a2fd67805d0d87eb02fcc205948ef7
          path: third_party/mujoco_menagerie

      - name: Run tests
        run: |
          python -W error::ResourceWarning -m unittest discover \
            -s source/vgarm_app/tests \
            -p 'test_*.py'

      - name: Real depth and segmentation rendering smoke
        run: |
          python -W error::ResourceWarning -m unittest \
            vgarm_app.tests.test_trajectory.DepthSegmentationTests.test_metric_depth_segmentation_and_chunk_boundary

      - name: Check main CLI
        run: vgarm --help

      - name: Check benchmark CLI
        run: vgarm benchmark --help

      - name: Check whitespace errors
        run: git diff --check
