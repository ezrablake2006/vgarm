name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      MUJOCO_GL: osmesa
      PYOPENGL_PLATFORM: osmesa
      PYTHONPATH: ${{ github.workspace }}/source
      VGARM_MENAGERIE_ROOT: ${{ github.workspace }}/third_party/mujoco_menagerie

    steps:
      - name: Checkout VGArm
        uses: actions/checkout@v6

      - name: Checkout MuJoCo Menagerie
        uses: actions/checkout@v6
        with:
          repository: google-deepmind/mujoco_menagerie
          ref: main
          path: third_party/mujoco_menagerie

      - name: Show Menagerie revision
        run: |
          echo "VGARM_MENAGERIE_ROOT=$VGARM_MENAGERIE_ROOT"
          git -C "$VGARM_MENAGERIE_ROOT" rev-parse HEAD
          test -d "$VGARM_MENAGERIE_ROOT/franka_fr3"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install OSMesa
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libosmesa6-dev \
            libgl1-mesa-dri

      - name: Install VGArm and RGB dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[rgb]"

      - name: Verify package and MuJoCo
        run: |
          python - <<'PY'
          import mujoco
          import vgarm

          print("MuJoCo version:", mujoco.__version__)
          print("VGArm version:", vgarm.__version__)
          print("VGArm module:", vgarm.__file__)

          assert "/source/vgarm/" in vgarm.__file__.replace("\\", "/")
          PY

      - name: Run tests
        run: |
          python -W error::ResourceWarning -X tracemalloc=10 \
            -m unittest discover \
            -s source/vgarm_app/tests \
            -p 'test_*.py'

      - name: Check main CLI
        run: vgarm --help

      - name: Check benchmark CLI
        run: vgarm benchmark --help

      - name: Check dataset CLI
        run: vgarm dataset --help

      - name: Check whitespace
        run: git diff --check
