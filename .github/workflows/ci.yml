name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install .
      - run: python -m unittest discover -s source/vgarm_app/tests -p 'test_*.py'
      - run: vgarm --help
      - run: vgarm benchmark --help
      - run: git diff --check
