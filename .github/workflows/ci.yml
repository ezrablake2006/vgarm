name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with RGB dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[rgb]"

      - name: Run tests
        env:
          MUJOCO_GL: egl
        run: |
          python -m unittest discover \
            -s source/vgarm_app/tests \
            -p 'test_*.py'

      - name: Check main CLI
        run: vgarm --help

      - name: Check benchmark CLI
        run: vgarm benchmark --help

      - name: Check whitespace errors
        run: git diff --check
