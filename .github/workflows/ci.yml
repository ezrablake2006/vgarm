name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MUJOCO_GL: osmesa
      PYOPENGL_PLATFORM: osmesa
      PYTHONPATH: ${{ github.workspace }}/source
      VGARM_MENAGERIE_ROOT: ${{ github.workspace }}/third_party/mujoco_menagerie

    steps:
      - name: Checkout VGArm
        uses: actions/checkout@v4

      - name: Checkout MuJoCo Menagerie
        uses: actions/checkout@v4
        with:
          repository: google-deepmind/mujoco_menagerie
          path: third_party/mujoco_menagerie

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install headless rendering libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libosmesa6-dev \
            libgl1-mesa-dri

      - name: Install VGArm and RGB dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[rgb]"

      - name: Check MuJoCo Menagerie
        run: |
          echo "VGARM_MENAGERIE_ROOT=$VGARM_MENAGERIE_ROOT"
          test -d "$VGARM_MENAGERIE_ROOT"
          test -d "$VGARM_MENAGERIE_ROOT/franka_fr3"
          ls "$VGARM_MENAGERIE_ROOT/franka_fr3" | head

      - name: Run tests
        run: |
          python -m unittest discover \
            -s source/vgarm_app/tests \
            -p 'test_*.py'

      - name: Check main CLI
        run: vgarm --help

      - name: Check benchmark CLI
        run: vgarm benchmark --help

      - name: Check whitespace errors
        run: git diff --check
